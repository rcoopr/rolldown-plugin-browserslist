name: build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        # waiting on: https://github.com/actions/setup-node/issues/531
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
      - run: yarn install --immutable
      - run: yarn format:check
      - run: yarn typecheck
      - run: yarn build
      - run: yarn test
      - name: test built package on node@24
        working-directory: ./package-test/
        run: |
          yarn install

          node -v
          node test.cjs
          node test.mjs

      # lint comes after because the package-test directory needs to be
      # installed for the type-aware linting to work
      - run: yarn lint

      # Not using a matrix here since it's simpler
      # to just duplicate it and not spawn new instances

      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: test build package on node@20
        working-directory: ./package-test/
        run: |
          node -v
          node test.cjs
          node test.mjs

      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: test build package on node@20
        working-directory: ./package-test/
        run: |
          node -v
          node test.cjs
          node test.mjs
